name: Swell
options:
  bundleIdPrefix: com.peregrine
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  MLX:
    url: https://github.com/ml-explore/mlx-swift.git
    from: "0.20.0"
  MLXLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    revision: "2.21.2"
targets:
  Swell:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/spots.json
        buildPhase: resources
      - path: Resources/SurferYOLO.mlpackage
        buildPhase: sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: GRDB
      - package: MLX
      - product: MLXLLM
        package: MLXLM
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Swell
        NSCalendarsUsageDescription: "Swell creates calendar events so you can block time to go surf."
        NSLocationWhenInUseUsageDescription: "Swell uses your location to show nearby surf spots and conditions."
    settings:
      SWIFT_VERSION: "5.9"
  SwellTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes: ["Fixtures/**"]
      - path: Tests/Fixtures
        buildPhase: resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Swell
      - package: GRDB