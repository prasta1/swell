name: Swell
options:
  bundleIdPrefix: com.peregrine
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
targets:
  Swell:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/spots.json
        buildPhase: resources
      - path: Resources/SurferYOLO.mlpackage
        buildPhase: sources
    dependencies:
      - package: GRDB
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Swell
    settings:
      SWIFT_VERSION: "5.9"
  SwellTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes: ["Fixtures/**"]
      - path: Tests/Fixtures
        buildPhase: resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Swell
      - package: GRDB
